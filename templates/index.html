<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>袁庚书院骑行社排行榜</title>
    <style>
    :root {
        --primary: #3498db;
        --primary-dark: #2980b9;
        --secondary: #2ecc71;
        --secondary-dark: #27ae60;
        --accent: #e74c3c;
        --dark: #2c3e50;
        --gray: #7f8c8d;
        --light-bg: #f0f4f8;
        --shadow: 0 8px 30px rgba(0,0,0,0.08);
        --shadow-hover: 0 12px 40px rgba(0,0,0,0.12);
        --radius: 16px;
        --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    #ranking { overflow: hidden; }

    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    .tr-fade-out { animation: fadeOut 0.3s ease-out forwards; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .tr-fade-in { animation: fadeIn 0.5s ease-out; }

    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
    @keyframes logoGlow { 0%, 100% { box-shadow: 0 0 20px rgba(52,152,219,0.3); } 50% { box-shadow: 0 0 35px rgba(46,204,113,0.5); } }
    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: linear-gradient(135deg, #e8edf5 0%, #d5dce6 50%, #c8d4e3 100%);
        color: #333;
        line-height: 1.6;
        padding: 20px;
        min-height: 100vh;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
        background: rgba(255,255,255,0.92);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        overflow: visible;
        padding: 35px;
        border: 1px solid rgba(255,255,255,0.6);
    }

    /* ===== Logo ===== */
    .brand-logo {
        position: fixed;
        top: 20px;
        right: 24px;
        z-index: 1001;
        display: flex;
        align-items: center;
        gap: 10px;
        background: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(255,255,255,0.75));
        backdrop-filter: blur(12px);
        padding: 8px 18px 8px 14px;
        border-radius: 50px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        border: 1px solid rgba(255,255,255,0.8);
        animation: logoGlow 3s ease-in-out infinite;
        transition: all 0.3s ease;
        cursor: default;
        text-decoration: none;
    }
    .brand-logo:hover {
        transform: translateY(-2px) scale(1.03);
        box-shadow: 0 8px 30px rgba(52,152,219,0.25);
    }
    .brand-logo .logo-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #3498db, #2ecc71);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        color: white;
        flex-shrink: 0;
    }
    .brand-logo .logo-text {
        font-size: 0.95rem;
        font-weight: 700;
        background: linear-gradient(90deg, #2c3e50, #3498db);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 0.5px;
        white-space: nowrap;
    }
    .brand-logo .logo-tag {
        font-size: 0.55rem;
        color: var(--gray);
        -webkit-text-fill-color: var(--gray);
        background: none;
        font-weight: 500;
        letter-spacing: 0.3px;
    }

    .admin-mini-link {
        position: fixed;
        top: 72px;
        right: 28px;
        z-index: 1001;
        color: rgba(127, 140, 141, 0.5);
        font-size: 0.7rem;
        text-decoration: none;
        transition: color 0.3s ease;
    }
    .admin-mini-link:hover { color: var(--primary); }

    .search-highlight { background-color: #fff9c4; font-weight: bold; padding: 2px 0; }

    /* ===== Header ===== */
    .page-header {
        position: relative;
        padding: 30px 20px 25px;
        margin: -35px -35px 30px;
        background: linear-gradient(135deg, #1a2a3a 0%, #2c3e50 40%, #34495e 100%);
        border-radius: 24px 24px 0 0;
        overflow: hidden;
        text-align: center;
    }
    .page-header::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle at 30% 50%, rgba(52,152,219,0.15) 0%, transparent 50%),
                    radial-gradient(circle at 70% 50%, rgba(46,204,113,0.1) 0%, transparent 50%);
        pointer-events: none;
    }
    .page-header h1 {
        color: white;
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 1px;
        position: relative;
        z-index: 1;
    }
    .page-header .subtitle {
        color: rgba(255,255,255,0.6);
        font-size: 0.85rem;
        margin-top: 6px;
        position: relative;
        z-index: 1;
        letter-spacing: 2px;
    }
    .page-header .header-decoration {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, #3498db, #2ecc71, #e74c3c, #f39c12, #3498db);
        background-size: 200% 100%;
        animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer { 0% { background-position: 0% 0; } 100% { background-position: 200% 0; } }

    h2 {
        color: var(--dark);
        margin: 28px 0 16px;
        padding-left: 14px;
        border-left: 4px solid var(--primary);
        font-weight: 600;
        font-size: 1.2rem;
        position: relative;
    }
    h2::after {
        content: '';
        position: absolute;
        bottom: -4px;
        left: 14px;
        width: 40px;
        height: 3px;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        border-radius: 2px;
    }

    /* ===== Form Section ===== */
    #dataForm {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        align-items: end;
        background: linear-gradient(135deg, #f8faff 0%, #eef2f7 100%);
        padding: 28px;
        border-radius: var(--radius);
        border: 1px solid rgba(255,255,255,0.8);
        box-shadow: var(--shadow);
        transition: all 0.3s ease;
        margin-bottom: 20px;
    }
    #dataForm:hover { box-shadow: var(--shadow-hover); }

    .form-group { display: flex; flex-direction: column; }

    .form-group label {
        margin-bottom: 8px;
        color: var(--dark);
        font-weight: 600;
        font-size: 0.9rem;
    }

    #dataForm input[type="text"],
    #dataForm input[type="number"],
    #dataForm input[type="date"] {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e8ecf1;
        border-radius: var(--radius-sm);
        font-size: 1rem;
        transition: all 0.3s ease;
        background-color: white;
        outline: none;
    }
    #dataForm input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(52,152,219,0.12);
    }

    #dataForm button[type="submit"] {
        background: linear-gradient(90deg, var(--primary), var(--primary-dark));
        color: white;
        border: none;
        padding: 14px 28px;
        border-radius: var(--radius-sm);
        font-size: 1.05rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: block;
        width: 100%;
        letter-spacing: 0.5px;
        position: relative;
        overflow: hidden;
    }
    #dataForm button[type="submit"]:hover:not(:disabled) {
        background: linear-gradient(90deg, var(--primary-dark), var(--primary));
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(52,152,219,0.35);
    }
    #dataForm button[type="submit"]:active:not(:disabled) { transform: translateY(0); }
    #dataForm button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    #dataForm button.success-state { background: var(--secondary) !important; animation: pulse 0.5s ease-in-out; }

    /* ===== Filter Section ===== */
    #filterSection {
        background: linear-gradient(135deg, #ffffff 0%, #f8faff 100%);
        padding: 22px 24px;
        border-radius: var(--radius);
        margin: 20px 0;
        border: 1px solid rgba(255,255,255,0.8);
        box-shadow: var(--shadow);
        transition: box-shadow 0.3s ease;
    }
    #filterSection:hover { box-shadow: var(--shadow-hover); }

    #filterSection label { display: inline-block; margin-right: 10px; font-weight: 600; color: var(--dark); }
    #filterSection input[type="date"] {
        padding: 10px 14px;
        border: 2px solid #e8ecf1;
        border-radius: 8px;
        font-size: 0.95rem;
        margin-right: 12px;
        width: 170px;
        transition: border-color 0.3s ease;
        outline: none;
    }
    #filterSection input[type="date"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(52,152,219,0.1); }

    #filterSection button {
        padding: 10px 22px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-right: 8px;
    }
    #filterSection button:nth-of-type(1) { background: linear-gradient(90deg, var(--secondary), var(--secondary-dark)); color: white; }
    #filterSection button:nth-of-type(2) { background: linear-gradient(90deg, #e74c3c, #c0392b); color: white; }
    #filterSection button:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.12); }
    #filterSection button:active { transform: translateY(0); }

    /* ===== Sort ===== */
    #sortOption {
        padding: 10px 18px;
        border: 2px solid #e0e7ef;
        border-radius: var(--radius-sm);
        background-color: white;
        font-size: 0.95rem;
        font-weight: 500;
        color: var(--dark);
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 20px;
        width: auto;
        min-width: 160px;
    }
    #sortOption:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(52,152,219,0.12); }

    /* ===== Table ===== */
    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin-top: 20px;
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
    }
    thead { background: linear-gradient(90deg, #1a2a3a, #2c3e50); }
    th {
        padding: 16px 15px;
        text-align: center;
        color: white;
        font-weight: 600;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        border-right: 1px solid rgba(255,255,255,0.06);
    }
    th:last-child { border-right: none; }

    tbody tr { transition: all 0.25s ease; cursor: default; }
    tbody tr:nth-child(even) { background-color: #f8faff; }
    tbody tr:nth-child(odd) { background-color: white; }
    tbody tr:hover {
        background: linear-gradient(90deg, #eef6ff, #e3f2fd);
        transform: scale(1.003);
    }
    /* 前三名特殊样式 */
    tbody tr:nth-child(1) td:first-child {
        color: #f39c12;
        font-size: 1.3rem;
        text-shadow: 0 0 20px rgba(243,156,18,0.3);
    }
    tbody tr:nth-child(2) td:first-child { color: #95a5a6; font-size: 1.2rem; }
    tbody tr:nth-child(3) td:first-child { color: #cd7f32; font-size: 1.15rem; }

    td {
        padding: 14px 15px;
        text-align: center;
        border-bottom: 1px solid #f0f2f5;
        font-size: 0.95rem;
    }
    td:first-child { font-weight: 700; color: var(--primary); font-size: 1.05rem; }
    td:nth-child(3) { color: var(--accent); font-weight: 600; }
    td:nth-child(5) { color: var(--secondary-dark); font-weight: 600; }

    #filterInfo {
        background: linear-gradient(135deg, #e8f4fd, #d0ebf9);
        padding: 12px 20px;
        border-radius: 8px;
        margin: 15px 0;
        color: #1565c0;
        font-weight: 500;
        border-left: 4px solid #2196f3;
    }

    /* ===== Bottom Nav ===== */
    .sidebar-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        flex-direction: row;
        justify-content: space-around;
        align-items: center;
        background: rgba(255,255,255,0.92);
        backdrop-filter: blur(20px);
        padding: 10px 5px 18px;
        border-radius: 22px 22px 0 0;
        box-shadow: 0 -8px 30px rgba(0,0,0,0.08);
        z-index: 999;
        gap: 8px;
        border-top: 1px solid rgba(255,255,255,0.6);
    }
    .sidebar-nav a {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-decoration: none;
        color: var(--gray);
        padding: 8px 12px;
        border-radius: 12px;
        transition: all 0.3s ease;
        flex: 1;
        text-align: center;
        min-height: 44px;
        justify-content: center;
    }
    .sidebar-nav a:hover {
        background-color: #f0f7ff;
        color: var(--primary);
        transform: translateY(-3px);
    }
    .sidebar-nav a.active {
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: white;
        box-shadow: 0 4px 15px rgba(52,152,219,0.35);
    }
    .sidebar-nav .icon { font-size: 1.4rem; margin-bottom: 2px; }
    .sidebar-nav .text { font-size: 0.7rem; font-weight: 600; white-space: nowrap; }

    /* ===== Footer ===== */
    .page-footer {
        text-align: center;
        margin-top: 50px;
        padding-top: 20px;
        border-top: 1px solid #eef0f3;
        color: #bdc3c7;
        font-size: 0.8rem;
    }
    .page-footer a {
        color: #bdc3c7;
        text-decoration: none;
        transition: color 0.3s ease;
    }
    .page-footer a:hover { color: var(--primary); }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
        body { padding: 12px; }
        .container { padding: 16px 14px 100px !important; border-radius: 18px; }
        .page-header { margin: -16px -14px 20px; padding: 24px 16px 22px; border-radius: 18px 18px 0 0; }
        .page-header h1 { font-size: 1.3rem; }
        .page-header .subtitle { font-size: 0.7rem; letter-spacing: 1px; }

        h1 { font-size: 1.5rem !important; }
        h2 { font-size: 1.1rem !important; margin: 18px 0 12px; padding-left: 10px; }
        h2::after { left: 10px; width: 30px; }

        #filterSection { padding: 16px; }
        #filterSection input[type="date"] { width: calc(50% - 6px) !important; display: inline-block; margin-right: 0; margin-bottom: 10px; }
        #filterSection input[type="date"]:first-of-type { margin-right: 10px; }
        #filterSection button { width: auto; min-width: 60px; padding: 8px 14px; margin-right: 6px; margin-bottom: 10px; }
        #filterSection > div { margin-top: 6px; }

        #searchName { width: calc(100% - 80px) !important; }

        #dataForm { grid-template-columns: 1fr !important; padding: 18px !important; gap: 14px !important; }
        #dataForm input { padding: 11px 14px !important; font-size: 16px !important; min-height: 44px; }
        .form-group label { font-size: 0.85rem !important; margin-bottom: 4px !important; }
        .form-group small { font-size: 0.75rem !important; }
        #dataForm button[type="submit"] { padding: 13px 16px !important; font-size: 1rem !important; }

        table { display: block; overflow-x: auto; font-size: 0.85rem; }
        th, td { padding: 10px 8px; }

        .sidebar-nav { padding: 8px 5px 16px !important; border-radius: 18px 18px 0 0 !important; }
        .sidebar-nav a { padding: 6px 8px !important; }
        .sidebar-nav .text { font-size: 0.65rem; }
        .sidebar-nav .icon { font-size: 1.3rem; }

        .brand-logo { top: 12px; right: 14px; padding: 6px 14px 6px 10px; }
        .brand-logo .logo-icon { width: 30px; height: 30px; font-size: 0.95rem; }
        .brand-logo .logo-text { font-size: 0.8rem; }
        .brand-logo .logo-tag { display: none; }
        .admin-mini-link { top: 58px; right: 18px; }

        button:active, a:active { opacity: 0.7; transform: scale(0.98); }
        .loading, .empty-state { padding: 30px 15px; font-size: 0.9rem; }
    }

    @media (max-width: 400px) {
        .sidebar-nav .text { font-size: 0.6rem; }
        .sidebar-nav .icon { font-size: 1.2rem; }
    }

    @media (min-width: 769px) and (max-width: 1100px) {
        .container { width: 95%; max-width: none; padding: 24px; }
        table th:nth-child(1), table td:nth-child(1) { width: 10%; }
        table th:nth-child(2), table td:nth-child(2) { width: 20%; }
        table th:nth-child(3), table td:nth-child(3) { width: 15%; }
        table th:nth-child(4), table td:nth-child(4) { width: 15%; }
        table th:nth-child(5), table td:nth-child(5) { width: 20%; }
        table th:nth-child(6), table td:nth-child(6) { width: 20%; }
    }
</style>
</head>
<body>
    <!-- 流去冰ISDream Logo -->
    <a class="brand-logo" title="流去冰ISDream">
        <span class="logo-icon">🚴</span>
        <span>
            <span class="logo-text">流去冰ISDream</span><br>
            <span class="logo-tag">CYCLING · 骑行社</span>
        </span>
    </a>
    <a href="/admin/login" class="admin-mini-link">⚙️ 管理</a>

    <nav class="sidebar-nav">
        <a href="/" class="active">
            <span class="icon">🚴</span>
            <span class="text">骑行数据</span>
        </a>
        <a href="/news">
            <span class="icon">📰</span>
            <span class="text">新闻公告</span>
        </a>
    </nav>
    <div class="container">
        <div class="page-header">
            <h1>🚴 袁庚书院骑行社</h1>
            <div class="subtitle">RIDE · RECORD · RANK</div>
            <div class="header-decoration"></div>
        </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h2 style="margin: 0; border: none; padding: 0; color: var(--dark);">填写新记录</h2>
        <button type="button" id="toggleFormBtn" style="padding: 6px 14px; background: #95a5a6; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem;">
            收起 ▲
        </button>
    </div>
    <div id="uploadFormContainer">
        <form method="POST" id="dataForm">
            <div class="form-group">
                <label for="name">姓名</label>
                <input type="text" id="name" name="name" required placeholder="请输入姓名">
            </div>
            <div class="form-group">
                <label for="distance">距离 (公里)</label>
                <input type="number" step="0.01" id="distance" name="distance" required placeholder="0.00">
            </div>
            <div class="form-group">
                <label for="time">时间 (分钟)</label>
                <input type="number" step="0.1" id="time" name="time" required placeholder="0.0">
            </div>
            <div class="form-group">
                <label for="date">骑行日期</label>
                <input type="date" id="date" name="date" required>
            </div>
            <div class="form-group">
                <label style="font-weight: normal; cursor: pointer; display: flex; align-items: center; font-size: 0.9rem;">
                    <input type="checkbox" id="is_anonymous" name="is_anonymous" value="1" style="margin-right: 8px; width: auto;">
                    <span>匿名提交</span>
                </label>
                <small style="display: block; color: var(--gray); margin-top: 2px;">数据计入统计，排行榜和统计页不显示姓名</small>
            </div>
            <div class="form-group">
                <button type="submit">提交数据</button>
            </div>
            <div class="form-group">
                <label for="captcha">验证码</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="text" id="captcha" name="captcha" required
                        placeholder="{{ captcha_question if captcha_question else '1 + 1 = ?' }}"
                        style="flex: 1;">
                    <button type="button" onclick="refreshCaptcha()"
                        style="padding: 10px 14px; background: #6c757d; color: white; border: none; border-radius: 8px; font-size: 0.85rem; cursor: pointer;">
                        刷新
                    </button>
                </div>
                <small style="color: var(--gray); margin-top: 4px;">请计算结果，防止机器人提交</small>
            </div>
        </form>
    </div>

    <h2>数据筛选</h2>
    <div id="filterSection">
        <span style="color: var(--dark); font-weight: 600;">开始日期:</span> <input type="date" id="startDate">
        <span style="color: var(--dark); font-weight: 600;">结束日期:</span> <input type="date" id="endDate">
        <button onclick="applyFilter()">筛选</button>
        <button onclick="clearFilter()">清除筛选</button>
        <div style="margin-top: 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
            <span style="color: var(--dark); font-weight: 600;">姓名搜索:</span>
            <input type="text" id="searchName" placeholder="输入姓名或匿名ID"
                   style="padding: 10px 14px; flex: 1; min-width: 150px; border: 2px solid #e8ecf1; border-radius: 8px; font-size: 0.95rem; outline: none; transition: border-color 0.3s ease;"
                   oninput="debouncedSearch()"
                   onfocus="this.style.borderColor='#3498db'"
                   onblur="this.style.borderColor='#e8ecf1'">
            <button onclick="clearSearch()" style="padding: 10px 16px; background: #95a5a6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; transition: all 0.3s ease;">清空</button>
        </div>
    </div>

    <h2>实时排行榜</h2>
    <p style="color: var(--gray); font-size: 0.85rem; margin: -10px 0 10px 14px;">💡 点击姓名可查看详细个人统计</p>
    <select id="sortOption">
        <option value="distance">🏆 按距离排序</option>
        <option value="speed">⚡ 按均速排序</option>
        <option value="date">📅 按日期排序</option>
    </select>
    <table>
        <thead>
            <tr>
                <th>排名</th>
                <th>姓名</th>
                <th>距离 (km)</th>
                <th>时间 (min)</th>
                <th>均速 (km/h)</th>
                <th>日期</th>
            </tr>
        </thead>
        <tbody id="ranking">
            <!-- Data populated by JavaScript -->
        </tbody>
    </table>

    <div class="page-footer">
        <a href="/admin/login">⚙️ 管理后台</a> &middot; 袁庚书院骑行社 &middot; version 0.0.8
    </div>
</div>
<script>
    function refreshCaptcha() {
    fetch('/refresh_captcha')
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                document.getElementById('captcha').placeholder = data.question;
            }
        });
    }     
      
    let searchTimer = null;
    let isUpdatingRanking = false;
    
    function debouncedSearch() {
        clearTimeout(searchTimer);
        const tbody = document.getElementById('ranking');
        const oldRows = tbody.querySelectorAll('tr');
        if (oldRows.length > 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="loading">搜索中...</td></tr>';
        }
        searchTimer = setTimeout(() => {
            fetchRanking(document.getElementById('sortOption').value);
        }, 300);  // 输入停止300ms后搜索
    }

    function clearSearch() {
        document.getElementById('searchName').value = '';
        fetchRanking(document.getElementById('sortOption').value);
    }
    
    // 每5秒刷新排名

    function escapeHtml(text) {
    if (!text) return '';
        return text
            .toString()
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }   

    function fetchRanking(sortBy = 'distance') {
         if (isUpdatingRanking) {
            console.log('数据更新中，跳过此次重复调用。');
            return;
        }
        isUpdatingRanking = true;
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const searchName = document.getElementById('searchName').value;

        let url = `/get_ranking?sort_by=${sortBy}`;
        if (startDate) url += `&start_date=${startDate}`;
        if (endDate) url += `&end_date=${endDate}`;
        if (searchName) url += `&search_name=${encodeURIComponent(searchName)}`;

        const tbody = document.getElementById('ranking');
        const oldRows = Array.from(tbody.querySelectorAll('tr')); // 获取现有行
        const hasOldData = oldRows.length > 0 && !tbody.querySelector('.loading, .empty-state');
        
    // 1. 为旧数据添加淡出动画（如果有的话）
        if (hasOldData) {
            const fadeOutPromises = oldRows.map(tr => {
                return new Promise(resolve => {
                    tr.classList.add('tr-fade-out');
                    tr.addEventListener('animationend', resolve, { once: true });
                });
            });
            Promise.all(fadeOutPromises).then(() => {
            // 此时旧行已不可见，可以安全地发送请求
                fetchAndUpdateTable(url, tbody, startDate, endDate);
            });
        } else {
            // 如果没有旧数据（如初始状态、空状态），直接显示加载提示
            tbody.innerHTML = '<tr><td colspan="6" class="loading">加载中...</td></tr>';
            fetchAndUpdateTable(url, tbody, startDate, endDate);
        }
    }
    
    // 2. 发送请求获取新数据
    function fetchAndUpdateTable(url, tbody, startDate, endDate) {
    fetch(url)
        .then(response => response.json())
        .then(data => {
            // 3. 新数据到达后，清除旧内容
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无骑行记录</td></tr>';
                updateFilterInfo(startDate, endDate, 0);
                isUpdatingRanking = false;
                return;
            }
            
            // 4. 创建并插入新行，它们会自动应用原有的 fadeIn 动画
            data.forEach((row, index) => {
                const tr = document.createElement('tr');
                const escapedName = escapeHtml(row.name);
                const escapedDate = escapeHtml(row.date);
                
                const headers = ['排名', '姓名', '距离 (km)', '时间 (min)', '均速 (km/h)', '日期'];
                tr.innerHTML = `
                    <td data-label="${headers[0]}">${index + 1}</td>
                    <td data-label="${headers[1]}"><a href="/user/${encodeURIComponent(row.name)}" style="color: #3498db; text-decoration: none; font-weight: 600;">${escapedName}</a></td>
                    <td data-label="${headers[2]}">${row.distance.toFixed(2)}</td>
                    <td data-label="${headers[3]}">${row.time.toFixed(1)}</td>
                    <td data-label="${headers[4]}">${row.speed ? row.speed.toFixed(4) : '-'}</td>
                    <td data-label="${headers[5]}">${escapedDate}</td>
                `;
                tr.classList.add('tr-fade-in');
                tbody.appendChild(tr);
                tr.addEventListener('animationend', function() {
                    tr.classList.remove('tr-fade-in');
                }, { once: true }); 
            });
            updateFilterInfo(startDate, endDate, data.length);
            isUpdatingRanking = false;
        })
        .catch(error => {
            console.error('获取数据失败:', error);
            // 如果出错，移除淡出效果，恢复旧数据（如果有的话），或显示错误
            tbody.innerHTML = '';
            if (hasOldData) {
                // 可以在这里选择恢复旧数据或显示错误信息
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #e74c3c; padding: 20px;">数据刷新失败，请重试</td></tr>';
            } else {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #e74c3c; padding: 20px;">数据加载失败</td></tr>';
            }
            isUpdatingRanking = false;
        });
    }

    
    function applyFilter() {
        fetchRanking(document.getElementById('sortOption').value);
    }
    
    function clearFilter() {
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        fetchRanking(document.getElementById('sortOption').value);
    }
    
    function updateFilterInfo(startDate, endDate, count) {
        let info = `共 ${count} 条记录`;
        if (startDate || endDate) {
            info += '（筛选条件：';
            if (startDate) info += `从 ${startDate} `;
            if (endDate) info += `到 ${endDate}`;
            info += ')';
        }
        
        let infoDiv = document.getElementById('filterInfo');
        if (!infoDiv) {
            infoDiv = document.createElement('div');
            infoDiv.id = 'filterInfo';
            infoDiv.style.margin = '10px 0';
            infoDiv.style.padding = '5px';
            infoDiv.style.backgroundColor = '#f0f0f0';
            document.getElementById('filterSection').after(infoDiv);
        }
        infoDiv.textContent = info;
    }
    
    // 页面加载初始化
    window.onload = function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = today;
        
        // 设置默认骑行日期
        const dateInput = document.getElementById('date');
        if (dateInput && !dateInput.value) {
            dateInput.value = today;
        }
        
        // 初始加载数据
        fetchRanking();
        
        // 监听排序选项变化
        document.getElementById('sortOption').addEventListener('change', (e) => {
            fetchRanking(e.target.value);
        });
        
        // --- 表单收起/展开功能 ---
        const toggleFormBtn = document.getElementById('toggleFormBtn');
        const formContainer = document.getElementById('uploadFormContainer');
        
        if (toggleFormBtn && formContainer) {
            toggleFormBtn.addEventListener('click', function() {
                if (formContainer.style.display === 'none') {
                    formContainer.style.display = 'block';
                    toggleFormBtn.textContent = '收起 ▲';
                    toggleFormBtn.style.background = '#95a5a6';
                } else {
                    formContainer.style.display = 'none';
                    toggleFormBtn.textContent = '展开 ▼';
                    toggleFormBtn.style.background = '#2ecc71';
                }
            });
        }
        // --- 表单收起/展开功能结束 ---
        
        // --- 异步表单提交和按钮动画功能 ---
        const form = document.getElementById('dataForm');
        if (form) {
        // 先阻止默认行为，然后绑定事件
        form.addEventListener('submit', function(event) {
            // 立即阻止默认的提交行为
            event.preventDefault();
            event.stopPropagation();
            
            // 验证表单数据
            const name = document.getElementById('name').value.trim();
            const distance = document.getElementById('distance').value;
            const time = document.getElementById('time').value;
            
            if (!name) {
                alert('请输入姓名');
                return;
            }
            if (!distance || parseFloat(distance) <= 0) {
                alert('请输入有效的距离');
                return;
            }
            if (!time || parseFloat(time) <= 0) {
                alert('请输入有效的时间');
                return;
            }
            
            // 获取提交按钮
            const submitButton = this.querySelector('button[type="submit"]');
            if (!submitButton) return;
            
            // 保存原始状态
            const originalText = submitButton.textContent;
            const originalBackground = submitButton.style.background;
            const originalColor = submitButton.style.color;
            
            // 更新按钮状态
            submitButton.textContent = '✓';
            submitButton.style.background = '#2ecc71';
            submitButton.style.color = 'white';
            submitButton.disabled = true;
            
            // 准备表单数据
            const formData = new FormData(this);
            
            // 发送 AJAX 请求
            fetch('/', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('网络响应异常');
                }
                return response.json();
            })
            .then(data => {
                console.log('提交成功:', data);
                
                if (data.success) {
                    submitButton.textContent = '✓';
                    submitButton.style.background = '#2ecc71';
                    submitButton.style.color = 'white';
                    submitButton.disabled = true;
                    setTimeout(() => {
                    // 清空表单（而非重置整个表单结构，更温和）
                        document.getElementById('name').value = '';
                        document.getElementById('distance').value = '';
                        document.getElementById('time').value = '';
                    // 仅重置日期为今天
                        document.getElementById('date').value = today;
            
                    // 刷新排行榜
                        fetchRanking(document.getElementById('sortOption').value);
                    }, 300); 
                    // 保持成功状态2秒
                    setTimeout(() => {
                        // 恢复按钮状态
                        submitButton.textContent = originalText;
                        submitButton.style.background = originalBackground;
                        submitButton.style.color = originalColor;
                        submitButton.disabled = false;
                    }, 1500);
                } else {
                    // 后端返回错误
                    alert('提交失败: ' + (data.message || '未知错误'));
                    restoreButton();
                }
            })
            .catch(error => {
                console.error('提交错误:', error);
                alert('提交失败: ' + error.message);
                restoreButton();
            });
            
            // 恢复按钮状态的函数
            function restoreButton() {
                submitButton.textContent = originalText;
                submitButton.style.background = originalBackground;
                submitButton.style.color = originalColor;
                submitButton.disabled = false;
            }
        });
    } else {
        console.error('未找到表单元素，请检查表单ID是否为 dataForm');
    }
    // 在 window.onload 函数内添加
        //document.querySelectorAll('#dataForm input').forEach(input => {
           // input.addEventListener('focus', function() {
                // 简单延迟，等待键盘弹出
                //setTimeout(() => {
                   // this.scrollIntoView({ behavior: 'smooth', block: 'center' });
                //}, 300);
            //});
        //});
    // 定时刷新（每5秒）
    setInterval(() => {
        fetchRanking(document.getElementById('sortOption').value);
    }, 30000);
};
</script>
    <button id="backToTop" style="
        display: none;
        position: fixed;
        bottom: 100px; /* 在底部导航栏上方 */
        right: 15px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: #3498db;
        color: white;
        border: none;
        font-size: 1.2rem;
        cursor: pointer;
        box-shadow: 0 3px 10px rgba(52, 152, 219, 0.3);
        z-index: 1000;
    ">↑</button>

<script>
// 返回顶部功能
    const backToTopBtn = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
        backToTopBtn.style.display = window.scrollY > 300 ? 'block' : 'none';
    });
    backToTopBtn.addEventListener('click', () => {
        window.scrollTo({top: 0, behavior: 'smooth'});
    });
</script>
</body>
</html>
