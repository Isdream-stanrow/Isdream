<!DOCTYPE html>
<html>
<head>
    <title>袁庚书院骑行社排行榜</title>
    <style>
    /* 全局重置与基础设置 */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    #ranking {
        overflow: hidden;
    }   
    @keyframes fadeOut {
        from { opacity: 1; }
        to { opacity: 0; }
    }
    .tr-fade-out {
        animation: fadeOut 0.3s ease-out forwards;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .tr-fade-in {
        animation: fadeIn 0.5s ease-out;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        color: #333;
        line-height: 1.6;
        padding: 20px;
        min-height: 100vh;
    }
    
    .container {
        max-width: 1200px;
        margin: 0 auto;
        background-color: white;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        padding: 30px;
    }
    .search-highlight {
        background-color: #fff9c4;  /* 黄色高亮 */
        font-weight: bold;
        padding: 2px 0;
    }
    
    /* 标题样式 */
    h1 {
        color: #2c3e50;
        text-align: center;
        margin-bottom: 10px;
        font-size: 2.5rem;
        font-weight: 700;
        background: linear-gradient(90deg, #3498db, #2ecc71);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        padding-bottom: 10px;
        border-bottom: 3px solid #f1f2f6;
    }
    
    h2 {
        color: #34495e;
        margin: 25px 0 15px;
        padding-left: 10px;
        border-left: 4px solid #3498db;
        font-weight: 600;
    }
    
    /* 数据上传表单美化 */
    form {
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        padding: 25px;
        border-radius: 12px;
        margin: 20px 0;
        border: 1px solid #e0e0e0;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
    }
    
    form label {
        display: block;
        margin-bottom: 8px;
        color: #2c3e50;
        font-weight: 600;
        font-size: 0.95rem;
    }
    
    form input[type="text"],
    form input[type="number"],
    form input[type="date"],
    form input[type="date"] {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 20px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
        background-color: white;
    }
    
    form input:focus {
        border-color: #3498db;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        outline: none;
    }
    
    form button[type="submit"] {
    background: linear-gradient(90deg, #3498db, #2980b9);
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: block;
    width: 100%;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
    outline: none;
    }
    
    form button[type="submit"]:hover:not(:disabled) {
    background: linear-gradient(90deg, #2980b9, #3498db);
    transform: translateY(-2px);
    box-shadow: 0 7px 14px rgba(52, 152, 219, 0.3);
    }
    form button[type="submit"]:active:not(:disabled) {
    transform: translateY(0);
    transition: transform 0.1s;
    }
    form button[type="submit"]:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
    }
    form button.success-state {
    background: #2ecc71 !important;
    animation: pulse 0.5s ease-in-out;
    }
    @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(0.95); }
    100% { transform: scale(1); }
    }
    /* 筛选区域美化 */
    #filterSection {
        background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
        padding: 20px;
        border-radius: 12px;
        margin: 25px 0;
        border: 1px solid #e0e0e0;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
    }
    
    #filterSection label {
        display: inline-block;
        margin-right: 10px;
        font-weight: 600;
        color: #2c3e50;
    }
    
    #filterSection input[type="date"] {
        padding: 10px 12px;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        font-size: 0.95rem;
        margin-right: 15px;
        width: 180px;
    }
    
    #filterSection button {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-right: 10px;
    }
    
    #filterSection button:nth-of-type(1) {
        background: linear-gradient(90deg, #2ecc71, #27ae60);
        color: white;
    }
    
    #filterSection button:nth-of-type(2) {
        background: linear-gradient(90deg, #e74c3c, #c0392b);
        color: white;
    }
    
    #filterSection button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
    }
    
    /* 排序选择器美化 */
    #sortOption {
        padding: 10px 15px;
        border: 2px solid #3498db;
        border-radius: 8px;
        background-color: white;
        font-size: 1rem;
        font-weight: 500;
        color: #2c3e50;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 20px;
        width: 200px;
    }
    
    #sortOption:focus {
        outline: none;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
    }
    
    /* 表格美化 */
    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin-top: 20px;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
    }
    
    thead {
        background: linear-gradient(90deg, #2c3e50, #34495e);
    }
    
    th {
        padding: 18px 15px;
        text-align: center;
        color: white;
        font-weight: 600;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-right: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    th:last-child {
        border-right: none;
    }
    
    tbody tr {
        transition: all 0.3s ease;
    }
    
    tbody tr:nth-child(even) {
        background-color: #f8f9fa;
    }
    
    tbody tr:nth-child(odd) {
        background-color: white;
    }
    
    tbody tr:hover {
        background-color: #e3f2fd;
        transform: scale(1.005);
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
    }
    
    td {
        padding: 16px 15px;
        text-align: center;
        border-bottom: 1px solid #f1f2f6;
        font-size: 0.95rem;
    }
    
    /* 排名数字特殊样式 */
    td:first-child {
        font-weight: 700;
        color: #3498db;
        font-size: 1.1rem;
    }
    
    /* 数据高亮 */
    td:nth-child(3) { /* 距离列 */
        color: #e74c3c;
        font-weight: 600;
    }
    
    td:nth-child(5) { /* 均速列 */
        color: #27ae60;
        font-weight: 600;
    }
    
    /* 筛选信息显示 */
    #filterInfo {
        background: linear-gradient(135deg, #e3f2fd, #bbdefb);
        padding: 12px 20px;
        border-radius: 8px;
        margin: 15px 0;
        color: #1565c0;
        font-weight: 500;
        border-left: 4px solid #2196f3;
    }
    
    /* 响应式设计 */
    @media (max-width: 768px) {
        .container {
            padding: 15px;
            border-radius: 10px;
        }
        
        h1 {
            font-size: 1.8rem;
        }
        
        #filterSection {
            padding: 15px;
        }
        
        #filterSection input[type="date"] {
            width: 100%;
            margin-bottom: 10px;
        }
        
        #filterSection button {
            width: 100%;
            margin-bottom: 10px;
        }
        
        table {
            display: block;
            overflow-x: auto;
        }
        
        th, td {
            padding: 12px 8px;
            font-size: 0.9rem;
        }
        
        form {
            padding: 15px;
        }
    }
    
    /* 顶部装饰条 */
    .header-bar {
        height: 5px;
        background: linear-gradient(90deg, #3498db, #2ecc71, #e74c3c, #f39c12);
        border-radius: 5px 5px 0 0;
        margin-bottom: 20px;
    }
    
    /* 加载动画 */
    .loading {
        text-align: center;
        padding: 20px;
        color: #7f8c8d;
        font-style: italic;
    }
    
    /* 空状态提示 */
    .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #95a5a6;
        font-size: 1.1rem;
    }
    #dataForm {
        /* 上面行内样式已定义网格，这里补充细节 */
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        padding: 25px;
        border-radius: 12px;
        border: 1px solid #e0e0e0;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        transition: all 0.3s ease;
        margin-bottom: 20px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        margin-bottom: 8px;
        color: #2c3e50;
        font-weight: 600;
        font-size: 0.9rem;
    }

    #dataForm input[type="text"],
    #dataForm input[type="number"],
    #dataForm input[type="date"] {
        width: 100%; /* 在网格单元格内自适应 */
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
        background-color: white;
    }

/* 移动端下恢复为垂直布局 */
    @media (max-width: 768px) {
        #dataForm {
            grid-template-columns: 1fr !important; /* 强制单列 */
            gap: 15px;
        }
        .form-group {
            margin-bottom: 0;
        }
    }

    /* 侧边栏导航样式 */
        .sidebar-nav {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            border-radius: 12px;
            padding: 20px 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .sidebar-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #7f8c8d;
            padding: 12px 8px;
            border-radius: 8px;
            transition: all 0.3s ease;
            width: 100%;
            text-align: center;
        }   

        .sidebar-nav a:hover {
            background-color: #f1f8ff;
            color: #3498db;
            transform: translateX(3px);
        }

        .sidebar-nav a.active {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }

        .sidebar-nav .icon {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .sidebar-nav .text {
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
        }

        /* 为移动端优化 */
        @media (max-width: 1100px) {
            .sidebar-nav {
                position: fixed;
                bottom: 0;
                top: auto;
                left: 0;
                right: 0;
                transform: none;
                flex-direction: row;
                justify-content: space-around;
                padding: 10px 5px;
                border-radius: 15px 15px 0 0;
                box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.1);
        }
    
            .sidebar-nav a {
                padding: 8px 5px;
            }
    
            .sidebar-nav .text {
                font-size: 0.7rem;
            }
    
            .sidebar-nav .icon {
                font-size: 1.3rem;
                margin-bottom: 3px;
            }
    
        /* 在移动端，为主内容增加底部内边距，防止被侧边栏遮挡 */
            .container {
                padding-bottom: 80px;
            }
    }
</style>
</head>

    <div class="container">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">

<h2>数据筛选</h2>
<div id="filterSection">
    开始日期: <input type="date" id="startDate">
    结束日期: <input type="date" id="endDate">
    <button onclick="applyFilter()">筛选</button>
    <button onclick="clearFilter()">清除筛选</button>
    <div style="margin-top: 10px;">
        姓名搜索: 
        <input type="text" id="searchName" placeholder="输入姓名或匿名ID" 
               style="padding: 8px; width: 200px; border: 2px solid #e0e0e0; border-radius: 6px;"
               oninput="debouncedSearch()">
        <button onclick="clearSearch()" style="padding: 8px 12px; background: #95a5a6; color: white; border: none; border-radius: 6px;">清空</button>
    </div>
</div>
    <h2>实时排行榜</h2>
    <select id="sortOption">
    <option value="distance">按距离排序</option>
    <option value="speed">按均速排序</option>
    <option value="date">按日期排序</option>
</select>
    <table>
        <thead>
        <tr>
            <th>排名</th>
            <th>姓名</th>
            <th>距离 (km)</th>
            <th>时间 (min)</th>
            <th>均速 (km/h)</th>

        </thead>
        <tbody id="ranking">
            <!-- 数据由 JavaScript 填充 -->
        </tbody>

<div style="text-align: center; margin: 20px 0; color: #7f8c8d;">
    <p>点击排行榜中的姓名可以查看详细个人统计喵</p>
</div>
<div style="text-align: center; margin-top: 40px; color: #bdc3c7; font-size: 0.8rem;">
    <a href="/admin/login" style="color: inherit; text-decoration: none;">管理</a>
</div>
<script>
    function refreshCaptcha() {
    fetch('/refresh_captcha')
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                document.getElementById('captcha').placeholder = data.question;
            }
        });
    }       
    let searchTimer = null;
    function debouncedSearch() {
        clearTimeout(searchTimer);
        const tbody = document.getElementById('ranking');
        const oldRows = tbody.querySelectorAll('tr');
        if (oldRows.length > 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="loading">搜索中...</td></tr>';
        }
        searchTimer = setTimeout(() => {
            fetchRanking(document.getElementById('sortOption').value);
        }, 300);  // 输入停止300ms后搜索
    }

    function clearSearch() {
        document.getElementById('searchName').value = '';
        fetchRanking(document.getElementById('sortOption').value);
    }
    let isUpdatingRanking = false
    // 每5秒刷新排名

    function escapeHtml(text) {
    if (!text) return '';
        return text
            .toString()
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }   

    function fetchRanking(sortBy = 'distance') {
         if (isUpdatingRanking) {
            console.log('数据更新中，跳过此次重复调用。');
            return;
        }
        isUpdatingRanking = true;
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const searchName = document.getElementById('searchName').value;

        let url = `/get_ranking?sort_by=${sortBy}`;
        if (startDate) url += `&start_date=${startDate}`;
        if (endDate) url += `&end_date=${endDate}`;
        if (searchName) url += `&search_name=${encodeURIComponent(searchName)}`;

        const tbody = document.getElementById('ranking');
        const oldRows = Array.from(tbody.querySelectorAll('tr')); // 获取现有行
        const hasOldData = oldRows.length > 0 && !tbody.querySelector('.loading, .empty-state');
        
    // 1. 为旧数据添加淡出动画（如果有的话）
        if (hasOldData) {
            const fadeOutPromises = oldRows.map(tr => {
                return new Promise(resolve => {
                    tr.classList.add('tr-fade-out');
                    tr.addEventListener('animationend', resolve, { once: true });
                });
            });
            Promise.all(fadeOutPromises).then(() => {
            // 此时旧行已不可见，可以安全地发送请求
                fetchAndUpdateTable(url, tbody, startDate, endDate);
            });
        } else {
            // 如果没有旧数据（如初始状态、空状态），直接显示加载提示
            tbody.innerHTML = '<tr><td colspan="6" class="loading">加载中...</td></tr>';
            fetchAndUpdateTable(url, tbody, startDate, endDate);
        }
    }
    
    // 2. 发送请求获取新数据
    function fetchAndUpdateTable(url, tbody, startDate, endDate) {
    fetch(url)
        .then(response => response.json())
        .then(data => {
            // 3. 新数据到达后，清除旧内容
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无骑行记录</td></tr>';
                updateFilterInfo(startDate, endDate, 0);
                isUpdatingRanking = false;
                return;
            }
            
            // 4. 创建并插入新行，它们会自动应用原有的 fadeIn 动画
            data.forEach((row, index) => {
                const tr = document.createElement('tr');
                const escapedName = escapeHtml(row.name);
                const escapedDate = escapeHtml(row.date);
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td><a href="/user/${encodeURIComponent(row.name)}" style="color: #3498db; text-decoration: none; font-weight: 600;">${escapeHtml(row.name)}</a></td>
                    <td>${row.distance.toFixed(2)}</td>
                    <td>${row.time.toFixed(1)}</td>
                    <td>${row.speed ? row.speed.toFixed(4) : '-'}</td>
                    <td>${row.date}</td>
                `;
                tr.classList.add('tr-fade-in');
                tbody.appendChild(tr);
                tr.addEventListener('animationend', function() {
                    tr.classList.remove('tr-fade-in');
                }, { once: true }); 
            });
            updateFilterInfo(startDate, endDate, data.length);
            isUpdatingRanking = false;
        })
        .catch(error => {
            console.error('获取数据失败:', error);
            // 如果出错，移除淡出效果，恢复旧数据（如果有的话），或显示错误
            tbody.innerHTML = '';
            if (hasOldData) {
                // 可以在这里选择恢复旧数据或显示错误信息
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #e74c3c; padding: 20px;">数据刷新失败，请重试</td></tr>';
            } else {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #e74c3c; padding: 20px;">数据加载失败</td></tr>';
            }
            isUpdatingRanking = false;
        });
    }

    
    function applyFilter() {
        fetchRanking(document.getElementById('sortOption').value);
    }
    
    function clearFilter() {
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        fetchRanking(document.getElementById('sortOption').value);
    }
    
    function updateFilterInfo(startDate, endDate, count) {
        let info = `共 ${count} 条记录`;
        if (startDate || endDate) {
            info += '（筛选条件：';
            if (startDate) info += `从 ${startDate} `;
            if (endDate) info += `到 ${endDate}`;
            info += ')';
        }
        
        let infoDiv = document.getElementById('filterInfo');
        if (!infoDiv) {
            infoDiv = document.createElement('div');
            infoDiv.id = 'filterInfo';
            infoDiv.style.margin = '10px 0';
            infoDiv.style.padding = '5px';
            infoDiv.style.backgroundColor = '#f0f0f0';
            document.getElementById('filterSection').after(infoDiv);
        }
        infoDiv.textContent = info;
    }
    
    // 页面加载初始化
    window.onload = function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = today;
        
        // 设置默认骑行日期
        const dateInput = document.getElementById('date');
        if (dateInput && !dateInput.value) {
            dateInput.value = today;
        }
        
        // 初始加载数据
        fetchRanking();
        
        // 监听排序选项变化
        document.getElementById('sortOption').addEventListener('change', (e) => {
            fetchRanking(e.target.value);
        });
        
        // --- 表单收起/展开功能 ---
        const toggleFormBtn = document.getElementById('toggleFormBtn');
        const formContainer = document.getElementById('uploadFormContainer');
        
        if (toggleFormBtn && formContainer) {
            toggleFormBtn.addEventListener('click', function() {
                if (formContainer.style.display === 'none') {
                    formContainer.style.display = 'block';
                    toggleFormBtn.textContent = '收起 ▲';
                    toggleFormBtn.style.background = '#95a5a6';
                } else {
                    formContainer.style.display = 'none';
                    toggleFormBtn.textContent = '展开 ▼';
                    toggleFormBtn.style.background = '#2ecc71';
                }
            });
        }
        // --- 表单收起/展开功能结束 ---
        
        // --- 异步表单提交和按钮动画功能 ---
        const form = document.getElementById('dataForm');
        if (form) {
        // 先阻止默认行为，然后绑定事件
        form.addEventListener('submit', function(event) {
            // 立即阻止默认的提交行为
            event.preventDefault();
            event.stopPropagation();
            
            // 验证表单数据
            const name = document.getElementById('name').value.trim();
            const distance = document.getElementById('distance').value;
            const time = document.getElementById('time').value;
            
            if (!name) {
                alert('请输入姓名');
                return;
            }
            if (!distance || parseFloat(distance) <= 0) {
                alert('请输入有效的距离');
                return;
            }
            if (!time || parseFloat(time) <= 0) {
                alert('请输入有效的时间');
                return;
            }
            
            // 获取提交按钮
            const submitButton = this.querySelector('button[type="submit"]');
            if (!submitButton) return;
            
            // 保存原始状态
            const originalText = submitButton.textContent;
            const originalBackground = submitButton.style.background;
            const originalColor = submitButton.style.color;
            
            // 更新按钮状态
            submitButton.textContent = '✓';
            submitButton.style.background = '#2ecc71';
            submitButton.style.color = 'white';
            submitButton.disabled = true;
            
            // 准备表单数据
            const formData = new FormData(this);
            
            // 发送 AJAX 请求
            fetch('/', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('网络响应异常');
                }
                return response.json();
            })
            .then(data => {
                console.log('提交成功:', data);
                
                if (data.success) {
                    submitButton.textContent = '✓';
                    submitButton.style.background = '#2ecc71';
                    submitButton.style.color = 'white';
                    submitButton.disabled = true;
                    setTimeout(() => {
                    // 清空表单（而非重置整个表单结构，更温和）
                        document.getElementById('name').value = '';
                        document.getElementById('distance').value = '';
                        document.getElementById('time').value = '';
                    // 仅重置日期为今天
                        document.getElementById('date').value = today;
            
                    // 刷新排行榜
                        fetchRanking(document.getElementById('sortOption').value);
                    }, 300); 
                    // 保持成功状态2秒
                    setTimeout(() => {
                        // 恢复按钮状态
                        submitButton.textContent = originalText;
                        submitButton.style.background = originalBackground;
                        submitButton.style.color = originalColor;
                        submitButton.disabled = false;
                    }, 1500);
                } else {
                    // 后端返回错误
                    alert('提交失败: ' + (data.message || '未知错误'));
                    restoreButton();
                }
            })
            .catch(error => {
                console.error('提交错误:', error);
                alert('提交失败: ' + error.message);
                restoreButton();
            });
            
            // 恢复按钮状态的函数
            function restoreButton() {
                submitButton.textContent = originalText;
                submitButton.style.background = originalBackground;
                submitButton.style.color = originalColor;
                submitButton.disabled = false;
            }
        });
    } else {
        console.error('未找到表单元素，请检查表单ID是否为 dataForm');
    }
    
    // 定时刷新（每5秒）
    setInterval(() => {
        fetchRanking(document.getElementById('sortOption').value);
    }, 30000);
};
</script>
</body>
</html>
